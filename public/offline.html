<!doctype html>
<html lang="en-PH">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#002E2C" />
    <title>PrintFlow is offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #ffffff;
        color: #002e2c;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            circle at top,
            rgba(0, 115, 109, 0.12),
            transparent 36%
          ),
          linear-gradient(180deg, #ffffff 0%, #e6f1f0 100%);
      }
      main {
        width: min(92vw, 540px);
        border: 1px solid rgba(128, 185, 182, 0.45);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(16px);
        box-shadow: 0 30px 80px rgba(0, 46, 44, 0.12);
        padding: 32px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 2.5rem);
        line-height: 1.1;
        color: #002e2c;
      }
      p {
        margin: 0 0 20px;
        font-size: 1rem;
        line-height: 1.6;
        color: #00736d;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 20px;
        border-radius: 999px;
        background: linear-gradient(135deg, #00736d, #002e2c);
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      a:hover {
        transform: scale(1.02);
        box-shadow: 0 12px 28px rgba(0, 115, 109, 0.35);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PrintFlow is offline</h1>
      <p>
        Your last opened pages are cached on this device. Reconnect to sync live
        orders, uploads, and shop updates.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
