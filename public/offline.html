<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>PrintFlow is offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            circle at top,
            rgba(37, 99, 235, 0.16),
            transparent 32%
          ),
          linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      }
      main {
        width: min(92vw, 540px);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 30px 80px rgba(15, 23, 42, 0.12);
        padding: 32px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.05;
      }
      p {
        margin: 0 0 20px;
        font-size: 1rem;
        line-height: 1.6;
        color: #334155;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        background: #0f172a;
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PrintFlow is offline</h1>
      <p>
        Your last opened PrintFlow pages are cached locally. Reconnect to use
        live order updates, uploads, and shop actions again.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
